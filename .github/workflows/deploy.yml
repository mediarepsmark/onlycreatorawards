name: Deploy

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy main to Mojohost
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          password: ${{ secrets.SSH_PASSWORD }}
          port: ${{ secrets.SSH_PORT }}
          script: |
            set -e
            export PATH="$HOME/.nvm/versions/node/v22.22.2/bin:$PATH"
            if [ ! -d "$HOME/cpcadvertising/.git" ]; then
              git clone https://github.com/mediarepsmark/cpcadvertising.git "$HOME/cpcadvertising"
            fi
            cd "$HOME/cpcadvertising"
            git fetch origin main
            git reset --hard origin/main
            npm install
            npm run build
            pm2 delete cpcadvertising-app 2>/dev/null || true
            pm2 start npm --name cpcadvertising-app -- start
            pm2 save
            pm2 startup || true
